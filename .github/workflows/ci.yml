name: DALA CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Setup Environment
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Verify dotnet version
        run: dotnet --version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # 2. Build Rust WASM
      - name: Build Rust Engine
        run: |
          cd rust_engine
          wasm-pack build --target web --release

      # 3. Move WASM to Blazor (The Bridge)
      - name: Prepare WASM Assets
        run: |
          mkdir -p BlazorHost/wwwroot/js/rust_engine
          cp rust_engine/pkg/rust_engine_bg.wasm BlazorHost/wwwroot/js/rust_engine/
          cp rust_engine/pkg/rust_engine.js BlazorHost/wwwroot/js/rust_engine/

      # 3.5 Setup DuckDB WASM Assets
      - name: Setup DuckDB Assets
        run: |
          npm install
          npm run copy-duckdb

      # 3.8 Clean Stale Artifacts
      - name: Clean Environment
        run: |
          rm -rf .vercel release_output deploy_stage
          rm -rf BlazorHost/wwwroot/_framework
          dotnet clean BlazorHost/BlazorHost.csproj -c Release
          dotnet nuget locals all --clear

      # 4. Publish .NET
      - name: Publish Blazor App
        run: |
          dotnet publish BlazorHost/BlazorHost.csproj -c Release -o release_output \
            -p:BlazorEnableCompression=false \
            -p:CompressionEnabled=false

      # 4.5 Verify publish output
      - name: Check publish output
        run: |
          echo "=== release_output root ==="
          ls -la release_output/
          echo "=== wwwroot ==="
          ls -la release_output/wwwroot/
          echo "=== _framework (no .gz/.br) ==="
          find release_output/wwwroot/_framework \
            ! -name "*.gz" ! -name "*.br" | sort

      # 4.6 Materialize fingerprinted static assets for static hosting
      # .NET 10 uses staticwebassets.endpoints.json for virtual route mapping.
      # This only works with ASP.NET middleware. For static hosts like Vercel,
      # we must create physical file copies for every virtual route.
      - name: Materialize fingerprinted assets
        run: |
          MANIFEST="release_output/BlazorHost.staticwebassets.endpoints.json"
          WWWROOT="release_output/wwwroot"

          echo "=== Materializing fingerprinted routes as physical files ==="

          # Extract unique route -> assetFile pairs where no Selector exists
          # (i.e., the uncompressed variant), and where route != assetFile
          python3 -c "
          import json, os, shutil

          with open('$MANIFEST') as f:
              data = json.load(f)

          copies_made = 0
          for ep in data.get('Endpoints', []):
              route = ep.get('Route', '')
              asset = ep.get('AssetFile', '')
              selectors = ep.get('Selectors', [])

              # Only process entries with no content-encoding selector (uncompressed)
              if selectors:
                  continue

              # Skip if route already matches the asset filename
              if route == asset:
                  continue

              # Skip compressed variants
              if route.endswith('.br') or route.endswith('.gz'):
                  continue

              src = os.path.join('$WWWROOT', asset)
              dst = os.path.join('$WWWROOT', route)

              if os.path.exists(src) and not os.path.exists(dst):
                  os.makedirs(os.path.dirname(dst), exist_ok=True)
                  shutil.copy2(src, dst)
                  copies_made += 1
                  print(f'  COPY: {asset} -> {route}')

          print(f'Total files materialized: {copies_made}')
          "

          # Strip all pre-compressed .br and .gz files - Vercel handles compression
          echo "=== Stripping pre-compressed files ==="
          find "$WWWROOT" -name "*.br" -delete -o -name "*.gz" -delete
          echo "Done stripping .br/.gz files"

          # Verify critical files exist
          echo "=== Verifying critical unfingerpinted files ==="
          for f in blazor.webassembly.js dotnet.js dotnet.native.js dotnet.runtime.js; do
            if [ -f "$WWWROOT/_framework/$f" ]; then
              echo "  OK: _framework/$f ($(wc -c < "$WWWROOT/_framework/$f") bytes)"
            else
              echo "  MISSING: _framework/$f"
              exit 1
            fi
          done

      # 5.5 Assemble Vercel Prebuilt Output
      - name: Prepare Vercel Prebuilt Output
        run: |
          mkdir -p deploy_stage/.vercel/output/static

          # Inject build ID into index.html for cache busting
          sed -i "s/BUILD_ID_PLACEHOLDER/${{ github.run_id }}/g" release_output/wwwroot/index.html

          # Copy published wwwroot preserving all attributes and hidden files
          cp -a release_output/wwwroot/. deploy_stage/.vercel/output/static/

          # Prevent underscore-prefixed folders (_framework) from being ignored
          touch deploy_stage/.vercel/output/static/.nojekyll

          # Write Vercel Build Output API config
          cat > deploy_stage/.vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "cleanUrls": true,
            "trailingSlash": false,
            "routes": [
              { "src": "/_framework/blazor\\.webassembly\\.js", "headers": { "Content-Type": "application/javascript", "Cache-Control": "no-cache, no-store, must-revalidate" }, "continue": true },
              { "src": "/_framework/dotnet\\.js", "headers": { "Content-Type": "application/javascript", "Cache-Control": "no-cache" }, "continue": true },
              { "src": "/_framework/(.*)\\.wasm", "headers": { "Content-Type": "application/wasm" }, "continue": true },
              { "src": "/_framework/(.*)\\.js", "headers": { "Content-Type": "application/javascript" }, "continue": true },
              { "src": "/_framework/(.*)\\.mjs", "headers": { "Content-Type": "application/javascript" }, "continue": true },
              { "src": "/_framework/(.*)\\.dat", "headers": { "Content-Type": "application/octet-stream" }, "continue": true },
              { "src": "/js/(.*)\\.js", "headers": { "Content-Type": "application/javascript" }, "continue": true },
              { "src": "/js/(.*)\\.mjs", "headers": { "Content-Type": "application/javascript" }, "continue": true },
              { "src": "/(.*)\\.wasm", "headers": { "Content-Type": "application/wasm" }, "continue": true },
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html", "status": 200 }
            ]
          }
          EOF

          # Debug output
          echo "=== Static root ==="
          ls -la deploy_stage/.vercel/output/static/
          echo "=== _framework (unfingerpinted JS files) ==="
          ls -la deploy_stage/.vercel/output/static/_framework/*.js 2>/dev/null || echo "No JS files found"
          echo "=== _framework file count ==="
          find deploy_stage/.vercel/output/static/_framework -type f | wc -l

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          zeit-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}
          vercel-args: '--prod --prebuilt --force -e VERCEL_FORCE_NO_CACHE=1'
          working-directory: ./deploy_stage