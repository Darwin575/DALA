name: DALA CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Setup Environment
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Verify dotnet version
        run: dotnet --version

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      # 2. Build Rust WASM
      - name: Build Rust Engine
        run: |
          cd rust_engine
          wasm-pack build --target web --release

      # 3. Move WASM to Blazor (The Bridge)
      - name: Prepare WASM Assets
        run: |
          mkdir -p BlazorHost/wwwroot/js/rust_engine
          cp rust_engine/pkg/rust_engine_bg.wasm BlazorHost/wwwroot/js/rust_engine/
          cp rust_engine/pkg/rust_engine.js BlazorHost/wwwroot/js/rust_engine/

      # 3.5 Setup DuckDB WASM Assets
      - name: Setup DuckDB Assets
        run: |
          npm install
          npm run copy-duckdb

      # 3.8 Clean Stale Artifacts
      - name: Clean Environment
        run: |
          rm -rf .vercel release_output deploy_stage
          rm -rf BlazorHost/wwwroot/_framework
          dotnet clean BlazorHost/BlazorHost.csproj -c Release
          dotnet nuget locals all --clear

      # 4. Publish .NET (no separate build step — publish does it all)
      - name: Publish Blazor App
        run: |
          dotnet publish BlazorHost/BlazorHost.csproj -c Release -o release_output \
            -p:BlazorEnableCompression=false \
            -p:CompressionEnabled=false

      # 4.5 Verify publish output
      - name: Check publish output
        run: |
          echo "=== release_output root ==="
          ls -la release_output/

          echo "=== wwwroot ==="
          ls -la release_output/wwwroot/

          echo "=== _framework (no .gz/.br) ==="
          find release_output/wwwroot/_framework \
            ! -name "*.gz" ! -name "*.br" | sort

      # 5. Assemble Vercel Prebuilt Output
      - name: Prepare Vercel Prebuilt Output
        run: |
          mkdir -p deploy_stage/.vercel/output/static

          # Inject build ID into index.html for cache busting
          sed -i "s/BUILD_ID_PLACEHOLDER/${{ github.run_id }}/g" release_output/wwwroot/index.html

          # Copy published wwwroot preserving all attributes and hidden files
          cp -a release_output/wwwroot/. deploy_stage/.vercel/output/static/

          # Prevent underscore-prefixed folders (_framework) from being ignored
          touch deploy_stage/.vercel/output/static/.nojekyll

          # Write Vercel Build Output API config
          cat > deploy_stage/.vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "cleanUrls": true,
            "trailingSlash": false,
            "routes": [
              { "src": "/_framework/blazor.boot.json", "headers": { "Cache-Control": "no-cache, no-store, must-revalidate" }, "continue": true },
              { "src": "/_framework/blazor.webassembly(.*)\\.js", "headers": { "Content-Type": "application/javascript", "Cache-Control": "no-cache, no-store, must-revalidate" }, "continue": true },
              { "src": "/_framework/(.*)\\.wasm", "headers": { "Content-Type": "application/wasm", "Cache-Control": "public, max-age=31536000, immutable" }, "continue": true },
              { "src": "/_framework/(.*)\\.js", "headers": { "Content-Type": "application/javascript", "Cache-Control": "public, max-age=31536000, immutable" }, "continue": true },
              { "src": "/_framework/(.*)\\.mjs", "headers": { "Content-Type": "application/javascript", "Cache-Control": "public, max-age=31536000, immutable" }, "continue": true },
              { "src": "/_framework/(.*)\\.dat", "headers": { "Content-Type": "application/octet-stream", "Cache-Control": "public, max-age=31536000, immutable" }, "continue": true },
              { "src": "/js/(.*)\\.js", "headers": { "Content-Type": "application/javascript", "Cache-Control": "public, max-age=31536000, immutable" }, "continue": true },
              { "src": "/js/(.*)\\.mjs", "headers": { "Content-Type": "application/javascript", "Cache-Control": "public, max-age=31536000, immutable" }, "continue": true },
              { "src": "/(.*)\\.wasm", "headers": { "Content-Type": "application/wasm", "Cache-Control": "public, max-age=31536000, immutable" }, "continue": true },
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html", "status": 200 }
            ]
          }
          EOF

          # Copy vercel.json into deploy_stage for the CLI to pick up
          cp vercel.json deploy_stage/vercel.json

          # Debug output
          echo "=== Static root ==="
          ls -la deploy_stage/.vercel/output/static/
          echo "=== _framework ==="
          ls -la deploy_stage/.vercel/output/static/_framework/ || echo "_framework NOT FOUND"

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          zeit-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.ORG_ID }}
          vercel-project-id: ${{ secrets.PROJECT_ID }}
          vercel-args: '--prod --prebuilt --force -e VERCEL_FORCE_NO_CACHE=1'
          working-directory: ./deploy_stage