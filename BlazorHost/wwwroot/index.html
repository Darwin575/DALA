<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlazorHost</title>
    <base href="/" />
    <link rel="preload" id="webassembly" />
    <link rel="stylesheet" href="lib/bootstrap/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="BlazorHost.styles.css" rel="stylesheet" />
    <script type="importmap"></script>
</head>

<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="." class="reload">Reload</a>
        <span class="dismiss">🗙</span>
    </div>
    <script src="_framework/blazor.webassembly.js"></script>
    <script>
        window.rustInterop = {
            worker: null,
            init: function () {
                return new Promise((resolve, reject) => {
                    this.worker = new Worker('js/rust_worker.js', { type: 'module' });
                    this.worker.onmessage = (e) => {
                        if (e.data.status === 'ready') resolve();
                        if (e.data.status === 'error') reject(e.data.error);
                    };
                    this.worker.postMessage({ action: 'init' });
                });
            },
            detectOutliers: function (data) {
                return new Promise((resolve, reject) => {
                    const callback = (e) => {
                        if (e.data.status === 'success') {
                            this.worker.removeEventListener('message', callback);
                            resolve(e.data.result);
                        } else if (e.data.status === 'error') {
                            this.worker.removeEventListener('message', callback);
                            reject(e.data.error);
                        }
                    };
                    this.worker.addEventListener('message', callback);
                    this.worker.postMessage({ action: 'detect_outliers', data: data });
                });
            }
        };
    </script>
</body>

</html>
